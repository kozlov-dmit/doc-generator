server:
  port: ${SERVER_PORT:8080}

app:
  feature:
    enabled: ${APP_FEATURE_ENABLED:true}
    url: ${APP_URL:http://localhost}
    timeoutMs: ${APP_TIMEOUT:5000}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost/demo}
    username: ${DB_USER:demo}
    password: ${DB_PASSWORD}
    hikari:
      maximumPoolSize: ${DB_POOL_SIZE:10}
